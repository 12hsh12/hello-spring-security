<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background-color: #f8f9fa;">

<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background: linear-gradient(90deg, #1a1a2e, #0f3460);">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/home}" style="color: #e94560 !important;">HanSung</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 600px;">
    <div class="card shadow-sm border-0 mt-5">
        <div class="card-header bg-white border-bottom-0 pt-4 pb-0 text-center">
            <h4 class="fw-bold">상품 수정</h4>
        </div>
        <div class="card-body p-4">
            <form th:action="@{/products/{id}/edit(id=${productId})}" th:object="${productDto}" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">상품명</label>
                    <input type="text" th:field="*{name}" class="form-control" th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'">
                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">가격</label>
                        <input type="number" th:field="*{price}" class="form-control" th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-semibold">재고 수량</label>
                        <input type="number" th:field="*{stock}" class="form-control" th:classappend="${#fields.hasErrors('stock')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('stock')}" th:errors="*{stock}"></div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">상품 설명</label>
                    <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary py-2 fw-bold">수정 완료</button>
                    <a th:href="@{/products}" class="btn btn-light text-muted">취소</a>
                </div>
            </form>
        </div>
    </div>
</div>

<div style="margin-top: 50px; padding: 20px; text-align: center; border-top: 1px solid #ccc; font-weight: bold; background-color: #f8f9fa;">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' │ 학번: 2171115 │ 성명: 홍성환'}"></p>
</div>

</body>
</html>
