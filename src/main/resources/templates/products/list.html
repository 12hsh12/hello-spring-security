<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>상품 목록 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .table thead { background: #0f3460; color: #fff; }
        .table tbody tr:hover { background-color: #f0f4ff; }
        .badge-stock-high { background-color: #22c55e; }
        .badge-stock-low { background-color: #f59e0b; }
        .badge-stock-out { background-color: #ef4444; }
        .product-price { font-weight: 700; color: #e94560; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex justify-content-between align-items-start mb-3">
        <div>
            <div class="page-header mb-2">
                <h4 class="fw-bold mb-0">상품 목록</h4>
            </div>
            <small class="text-muted d-block" style="padding-left: 1rem;">
                총 <span th:text="${productPage.totalElements}"></span>개 상품
                (페이지 <span th:text="${productPage.number + 1}"></span> / <span th:text="${productPage.totalPages}"></span>)
            </small>
        </div>
        <a th:href="@{/products/add}" class="btn btn-danger px-4 py-2 fw-semibold" sec:authorize="hasRole('ADMIN')">+ 상품 등록</a>
    </div>

    <form th:action="@{/products}" method="get" class="d-flex gap-2 mb-4">
        <input type="text" name="keyword" class="form-control py-3" placeholder="상품명으로 검색" th:value="${keyword}" style="flex: 1;"/>
        <button type="submit" class="btn btn-primary px-4 fw-bold">검색</button>
        <a th:href="@{/products}" class="btn btn-outline-secondary px-4 fw-bold d-flex align-items-center">초기화</a>
    </form>

    <div class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div th:if="${productPage.isEmpty()}" class="text-center py-5 text-muted">
                <p class="mb-0">등록된 상품이 (또는 검색 결과가) 없습니다.</p>
            </div>

            <div th:unless="${productPage.isEmpty()}" class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead>
                    <tr>
                        <th class="ps-4" style="width:60px">#</th>
                        <th>상품명</th>
                        <th>설명</th>
                        <th class="text-end">가격</th>
                        <th class="text-center">재고</th>
                        <th class="text-center" sec:authorize="hasRole('ADMIN')">관리</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="p : ${productPage.content}">
                        <td class="ps-4" th:text="${p.id}">1</td>
                        <td th:text="${p.name}">상품명</td>
                        <td class="text-muted" th:text="${p.description}">설명</td>
                        <td class="text-end product-price" th:text="${#numbers.formatInteger(p.price, 3, 'COMMA')} + '원'">10,000원</td>
                        <td class="text-center">
                            <span th:if="${p.stock > 0}" th:text="${p.stock}" class="badge bg-success">10</span>
                            <span th:unless="${p.stock > 0}" class="badge bg-danger">품절</span>
                        </td>
                        <td class="text-center" sec:authorize="hasRole('ADMIN')">
                            <a th:href="@{/products/{id}/edit(id=${p.id})}" class="btn btn-sm btn-outline-primary">수정</a>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <nav class="mt-4 mb-4" th:if="${productPage.totalPages > 0}">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${!productPage.hasPrevious()} ? 'disabled'">
                            <a class="page-link"
                               th:href="${keyword != null} ? @{/products(page=${productPage.number - 1}, size=${productPage.size}, keyword=${keyword})}
                                       : @{/products(page=${productPage.number - 1}, size=${productPage.size})}">이전</a>
                        </li>

                        <li th:each="i : ${#numbers.sequence(0, productPage.totalPages - 1)}"
                            class="page-item"
                            th:classappend="${i == productPage.number} ? 'active'">
                            <a class="page-link"
                               th:href="${keyword != null} ? @{/products(page=${i}, size=${productPage.size}, keyword=${keyword})}
                                       : @{/products(page=${i}, size=${productPage.size})}"
                               th:text="${i + 1}"></a>
                        </li>

                        <li class="page-item" th:classappend="${!productPage.hasNext()} ? 'disabled'">
                            <a class="page-link"
                               th:href="${keyword != null} ? @{/products(page=${productPage.number + 1}, size=${productPage.size}, keyword=${keyword})}
                                       : @{/products(page=${productPage.number + 1}, size=${productPage.size})}">다음</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<div style="margin-top: 50px; padding: 20px; text-align: center; border-top: 1px solid #ccc; font-weight: bold; background-color: #f8f9fa;">
    <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' │ 학번: 2171115 │ 성명: 홍성환'}"></p>
</div>
</body>
</html>
